        <script src="https://cdnjs.cloudflare.com/ajax/libs/html-to-image/1.11.11/html-to-image.min.js"></script>
        <style>
                    :root {
                                    --bg-color: #0b0e11;
                                    --card-bg: #1e2329;
                                    --text-main: #eaecef;
                                    --text-grey: #848e9c;
                                    --accent-green: #2ebd85;
                                    --accent-red: #f6465d;
                    }

                    body {
                                    margin: 0;
                                    padding: 0;
                                    background-color: var(--bg-color);
                                    color: var(--text-main);
                                    font-family: 'Inter', sans-serif;
                                    display: flex;
                                    flex-direction: column;
                                    align-items: center;
                                    min-height: 100vh;
                                    overflow-x: hidden;
                    }

                    .header {
                                    width: 100%;
                                    padding: 15px;
                                    text-align: center;
                                    background: var(--card-bg);
                                    border-bottom: 1px solid #333;
                                    font-weight: 700;
                                    font-size: 1.2rem;
                                    position: sticky;
                                    top: 0;
                                    z-index: 100;
                    }

                    /* Preview Container */
                    .preview-container {
                                    position: relative;
                                    margin: 20px 0;
                                    width: 350px;
                                    height: 377px;
                                    box-shadow: 0 10px 30px rgba(0,0,0,0.5);
                                    background: #000;
                                    transform-origin: top center;
                    }

                    .pnl-mockup {
                                    position: relative;
                                    width: 1179px;
                                    height: 1269px;
                                    background-image: url('template.jpg');
                                    background-size: cover;
                                    transform: scale(0.29686);
                                    transform-origin: top left;
                    }

                    /* Editable Elements */
                    .editable {
                                    position: absolute;
                                    outline: none;
                                    cursor: text;
                                    white-space: nowrap;
                    }

                    .editable:hover {
                                    background: rgba(255,255,255,0.1);
                                    border-radius: 4px;
                    }

                    .date-text {
                                    top: 100px;
                                    left: 98px;
                                    font-size: 22px;
                                    color: var(--text-grey);
                                    font-weight: 700;
                    }

                    .pair-text {
                                    top: 250px;
                                    left: 98px;
                                    font-size: 48px;
                                    color: #fff;
                                    font-weight: 900;
                    }

                    .side-container {
                                    top: 335px;
                                    left: 98px;
                                    font-size: 38px;
                                    font-weight: 900;
                                    display: flex;
                                    gap: 15px;
                                    align-items: center;
                    }

                    .side-text { color: var(--accent-green); }
                    .sep { color: var(--text-grey); }
                    .lev-text { color: var(--text-grey); }

                    .pnl-container {
                                    top: 440px;
                                    left: 98px;
                                    display: flex;
                                    align-items: baseline;
                                    font-weight: 900;
                    }

                    .pnl-num { font-size: 195px; }
                    .pnl-perc { font-size: 100px; margin-left: 12px; }

                    .pnl-usd {
                                    top: 640px;
                                    left: 101px;
                                    font-size: 54px;
                                    font-weight: 900;
                    }

                    .price-row {
                                    position: absolute;
                                    left: 473px;
                                    font-size: 34px;
                                    font-weight: 900;
                                    color: #fff;
                                    text-align: left;
                    }

                    .entry-price { top: 852px; }
                    .close-price { top: 908px; }

                    .ref-code {
                                    top: 1035px;
                                    left: 507px;
                                    font-size: 38px;
                                    font-weight: 900;
                                    color: #fff;
                    }

                    /* Controls */
                    .controls {
                                    width: 100%;
                                    max-width: 400px;
                                    padding: 20px;
                                    box-sizing: border-box;
                                    background: var(--card-bg);
                                    border-radius: 20px 20px 0 0;
                                    margin-top: auto;
                    }

                    .control-group {
                                    margin-bottom: 15px;
                    }

                    label {
                                    display: block;
                                    font-size: 0.8rem;
                                    color: var(--text-grey);
                                    margin-bottom: 5px;
                    }

                    .btn-group {
                                    display: flex;
                                    gap: 10px;
                    }

                    button {
                                    flex: 1;
                                    padding: 12px;
                                    border: none;
                                    border-radius: 10px;
                                    background: #2b3139;
                                    color: var(--text-main);
                                    font-weight: 700;
                                    cursor: pointer;
                                    transition: all 0.2s;
                    }

                    button.active {
                                    background: var(--accent-green);
                                    color: #000;
                    }

                    button.active.red {
                                    background: var(--accent-red);
                                    color: #fff;
                    }

                    .download-btn {
                                    width: 100%;
                                    padding: 15px;
                                    background: var(--accent-green);
                                    color: #000;
                                    font-size: 1.1rem;
                                    margin-top: 20px;
                                    border-radius: 12px;
                    }

                    /* Tooltip */
                    .hint {
                                    font-size: 0.8rem;
                                    color: var(--text-grey);
                                    text-align: center;
                                    margin-bottom: 10px;
                    }
                </style>
    </head>
    <body>
            <div class="header">MEXC PNL EDITOR</div>div>

            <div class="preview-container" id="capture">
                        <div class="pnl-mockup">
                                        <div class="editable date-text" contenteditable="true" id="date">&#1055;&#1086;&#1076;&#1077;&#1083;&#1080;&#1083;&#1080;&#1089;&#1100; 2026-04-30 18:00:00</div>div>
                                        <div class="editable pair-text" contenteditable="true" id="pair">BTCUSDT &#1041;&#1077;&#1089;&#1089;&#1088;&#1086;&#1095;&#1085;&#1099;&#1081;</div>div>

                                        <div class="side-container">
                                                            <span class="editable side-text" contenteditable="true" id="side">&#1051;&#1086;&#1085;&#1075;</span>span>
                                                            <span class="sep">|</span>span>
                                                            <span class="editable lev-text" contenteditable="true" id="lev">20X</span>span>
                                        </div>div>

                                        <div class="pnl-container">
                                                            <span class="editable pnl-num" contenteditable="true" id="pnl_num">+46.15</span>span>
                                                            <span class="pnl-perc">%</span>span>
                                        </div>div>

                                        <div class="editable pnl-usd" contenteditable="true" id="pnl_usd">+46.1458 USDT</div>div>

                                        <div class="editable price-row entry-price" contenteditable="true" id="entry">$65 000.5000</div>div>
                                        <div class="editable price-row close-price" contenteditable="true" id="close">$66 500.2500</div>div>

                                        <div class="editable ref-code" contenteditable="true" id="ref">1LZN1</div>div>
                        </div>div>
            </div>div>

            <p class="hint">&#1058;&#1072;&#1087;&#1085;&#1080; &#1087;&#1086; &#1094;&#1080;&#1092;&#1088;&#1072;&#1084;, &#1095;&#1090;&#1086;&#1073;&#1099; &#1080;&#1079;&#1084;&#1077;&#1085;&#1080;&#1090;&#1100; &#1080;&#1093;</p>p>

            <div class="controls">
                        <div class="control-group">
                                        <label>&#1058;&#1080;&#1087; &#1089;&#1076;&#1077;&#1083;&#1082;&#1080;</label>
                                    <div class="btn-group">
                                                    <button id="btn-long" class="active" onclick="setSide('LONG')">LONG</button>button>
                                                    <button id="btn-short" onclick="setSide('SHORT')">SHORT</button>button>
                                    </div>div>
                        </div>div>
            
                    <button class="download-btn" onclick="downloadImage()">&#1057;&#1050;&#1040;&#1063;&#1040;&#1058;&#1068; &#1050;&#1040;&#1056;&#1058;&#1048;&#1053;&#1050;&#1059;</button>button>
            </div>div>
    
        <script>
                    const colors = {
                                    green: '#2ebd85',
                                    red: '#f6465d',
                                    grey: '#848e9c'
                    };

                    function setSide(side) {
                                    const sideEl = document.getElementById('side');
                                    const numEl = document.getElementById('pnl_num');
                                    const usdEl = document.getElementById('pnl_usd');
                                    const btnLong = document.getElementById('btn-long');
                                    const btnShort = document.getElementById('btn-short');

                                    if (side === 'LONG') {
                                                        sideEl.innerHTML = '&#1051;&#1086;&#1085;&#1075;';
                                                        sideEl.style.color = colors.green;
                                                        numEl.style.color = colors.green;
                                                        usdEl.style.color = colors.green;
                                                        btnLong.classList.add('active');
                                                        btnShort.classList.remove('active', 'red');
                                    } else {
                                                        sideEl.innerHTML = '&#1064;&#1086;&#1088;&#1090;';
                                                        sideEl.style.color = colors.red;
                                                        numEl.style.color = colors.red;
                                                        usdEl.style.color = colors.red;
                                                        btnShort.classList.add('active', 'red');
                                                        btnLong.classList.remove('active');
                                    }
                    }

                    async function downloadImage() {
                                    const btn = document.querySelector('.download-btn');
                                    btn.innerText = '&#1043;&#1045;&#1053;&#1045;&#1056;&#1040;&#1062;&#1048;&#1071;...';

                                    const node = document.getElementById('capture');
                                    const mockup = document.querySelector('.pnl-mockup');
                                    mockup.style.transform = 'none';
                                    node.style.width = '1179px';
                                    node.style.height = '1269px';

                                    try {
                                                        const dataUrl = await htmlToImage.toPng(node, { quality: 1.0, pixelRatio: 1 });
                                                        const link = document.createElement('a');
                                                        link.download = `mexc_pnl_${Date.now()}.png`;
                                                        link.href = dataUrl;
                                                        link.click();
                                    } catch (error) {
                                                        console.error(error);
                                                        alert('&#1054;&#1096;&#1080;&#1073;&#1082;&#1072;');
                                    } finally {
                                                        mockup.style.transform = 'scale(0.29686)';
                                                        node.style.width = '350px';
                                                        node.style.height = '377px';
                                                        btn.innerText = '&#1057;&#1050;&#1040;&#1063;&#1040;&#1058;&#1068; &#1050;&#1040;&#1056;&#1058;&#1048;&#1053;&#1050;&#1059;';
                                    }
                    }

                    const now = new Date();
                    const dateStr = `&#1055;&#1086;&#1076;&#1077;&#1083;&#1080;&#1083;&#1080;&#1089;&#1100; ${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')} ${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}:${String(now.getSeconds()).padStart(2,'0')}`;
                    document.getElementById('date').innerHTML = dateStr;
        </script>
